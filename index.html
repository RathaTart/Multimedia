            {

            },

                "correct_answer": "b) รูปเริ่มที่ 2 จบที่ 4 สูง 1/sqrt(2)"
            },
            {
                "question": "จากตาราง (A:13%, B:25%, C:50%, D:12%) จงหา entropy ของการเข้ารหัส Huffman",

                "correct_answer": "c) 1.75 bit/symbol"

                "choices": ["a) 0.415 บิตต่อสัญลักษณ์", "b) 1.219 บิตต่อสัญลักษณ์", "c) 2.215 บิตต่อสัญลักษณ์", "d) 2.815 บิตต่อสัญลักษณ์"],
                "correct_answer": "c) 2.215 บิตต่อสัญลักษณ์"

        // 🌟 จุดที่แก้ปัญหา White Screen: คอมโพเนนต์ Icon แบบป้องกัน React Crash 🌟
        const Icon = ({ name, className }) => {
            const spanRef = React.useRef(null);

            React.useEffect(() => {
                if (spanRef.current) {
                    // หลอก React ว่าจัดการแค่ <span> ส่วนข้างใน <span> เราฉีด HTML เข้าไปให้ Lucide แปลงเอง
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className || ''}"></i>`;
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);

            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            const [currentIdx, setCurrentIdx] = React.useState(0);
            const [answers, setAnswers] = React.useState({});
            const [isFinished, setIsFinished] = React.useState(false);
            const [showExplanation, setShowExplanation] = React.useState(false);

            const score = React.useMemo(() => {
                return Object.entries(answers).reduce((acc, [idx, ans]) => {
                    if (ans === quizData[idx].correct_answer) return acc + 1;
                    return acc;
                }, 0);
            }, [answers]);

            const handleSelect = (choice) => {
                if (isFinished) return;
                setAnswers(prev => ({ ...prev, [currentIdx]: choice }));
                setShowExplanation(true);
            };

            const nextQuestion = () => {
                if (currentIdx < quizData.length - 1) {
                    setCurrentIdx(currentIdx + 1);
                    setShowExplanation(!!answers[currentIdx + 1]);
                } else {
                    setIsFinished(true);
                }
            };

            const prevQuestion = () => {
                if (currentIdx > 0) {
                    setCurrentIdx(currentIdx - 1);
                    setShowExplanation(true);
                }
            };

            const resetQuiz = () => {
                setAnswers({});
                setCurrentIdx(0);
                setIsFinished(false);
                setShowExplanation(false);
            };

            const progress = ((currentIdx + 1) / quizData.length) * 100;

            if (isFinished) {
                const isPerfect = score === quizData.length;
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                            <div className="bg-gradient-to-br from-indigo-600 to-violet-700 p-8 text-center text-white">
                                <div className="inline-flex items-center justify-center w-20 h-20 bg-white/20 rounded-full mb-4">
                                    <Icon name="award" className="w-10 h-10" />
                                </div>
                                <h1 className="text-3xl font-bold mb-2">สรุปผลคะแนน</h1>
                                <p className="opacity-90">เก่งมาก! ทำแบบทดสอบจบแล้ว</p>
                            </div>
                            <div className="p-8 text-center">
                                <div className="text-6xl font-black text-slate-800 mb-2">
                                    {score}<span className="text-2xl text-slate-400 font-medium">/{quizData.length}</span>
                                </div>
                                <div className="text-slate-500 font-medium mb-8">
                                    คิดเป็น {((score / quizData.length) * 100).toFixed(1)}%
                                </div>
                                {isPerfect && (
                                    <div className="bg-pink-50 text-pink-700 p-6 rounded-2xl mb-8 border border-pink-100 animate-bounce">
                                        <p className="text-2xl font-bold">💦Congrat! U R GAY!!!💦</p>
                                    </div>
                                )}
                                <button onClick={resetQuiz} className="w-full flex items-center justify-center gap-2 bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                                    <Icon name="rotate-ccw" className="w-5 h-5 shrink-0" /> ลองใหม่อีกครั้ง
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentQ = quizData[currentIdx];
            const selected = answers[currentIdx];

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="max-w-2xl w-full bg-white rounded-3xl shadow-xl border border-slate-100 flex flex-col min-h-[500px]">
                        {/* Header */}
                        <div className="p-6 border-b border-slate-100">
                            <div className="flex justify-between items-center mb-4">
                                <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold uppercase">
                                    Question {currentIdx + 1} of {quizData.length}
                                </span>
                                <span className="text-slate-400 text-sm font-medium">Score: {score}</span>
                            </div>
                            <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${progress}%` }} />
                            </div>
                        </div>

                        {/* Content */}
                        <div className="p-8 flex-grow">
                            <h2 className="text-xl font-bold text-slate-800 mb-8">{currentQ.question}</h2>
                            <div className="grid gap-4">
                                {currentQ.choices.map((choice, i) => {
                                    const isCorrect = choice === currentQ.correct_answer;
                                    const isSelected = selected === choice;
                                    let style = "border-slate-200 hover:border-indigo-300 hover:bg-indigo-50";
                                    if (selected) {
                                        if (isCorrect) style = "bg-emerald-50 border-emerald-500 text-emerald-800";
                                        else if (isSelected) style = "bg-rose-50 border-rose-500 text-rose-800";
                                        else style = "border-slate-100 text-slate-400 opacity-60";
                                    }
                                    return (
                                        <button key={i} disabled={!!selected} onClick={() => handleSelect(choice)} className={`w-full p-4 text-left border-2 rounded-2xl font-medium transition-all flex items-center justify-between ${style}`}>
                                            <span>{choice}</span>
                                            {selected && isCorrect && <Icon name="check-circle-2" className="text-emerald-500 shrink-0 ml-2" />}
                                            {selected && isSelected && !isCorrect && <Icon name="x-circle" className="text-rose-500 shrink-0 ml-2" />}
                                        </button>
                                    );
                                })}
                            </div>
                            {selected && (
                                <div className="mt-8 p-4 rounded-2xl flex gap-3 bg-indigo-50 text-indigo-700 border border-indigo-100">
                                    <Icon name="info" className="shrink-0" />
                                    <p className="text-sm font-medium">
                                        {selected === currentQ.correct_answer ? "ถูกต้องแล้ว! นี่คือพื้นฐานสำคัญ" : `เฉลยคือ: ${currentQ.correct_answer}`}
                                    </p>
                                </div>
                            )}
                        </div>

                        {/* Navigation */}
                        <div className="p-6 bg-slate-50 rounded-b-3xl border-t flex justify-between">
                            <button onClick={prevQuestion} disabled={currentIdx === 0} className="px-6 py-3 flex items-center gap-2 font-bold text-slate-500 hover:text-indigo-600 disabled:opacity-0 transition-all">
                                <Icon name="chevron-left" className="shrink-0" /> ย้อนกลับ
                            </button>
                            <button onClick={nextQuestion} disabled={!selected} className="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold flex items-center gap-2 active:scale-95 disabled:opacity-50 transition-all">
                                {currentIdx === quizData.length - 1 ? 'ดูผลคะแนน' : 'ถัดไป'} <Icon name="chevron-right" className="shrink-0" />
                            </button>
                        </div>
                    </div>
                    <p className="mt-8 text-slate-400 text-xs text-center font-medium tracking-wide">
                        Student: Radha R. (66011464) | KMITL Computer Engineering
                    </p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
